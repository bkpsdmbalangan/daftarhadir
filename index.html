<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Hadir - BKPSDM Balangan</title>
  
  <!-- Ini kode favicon kamu -->
  <link rel="icon" type="image/png" href="favicon.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #003366; --accent: #fbbf24; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    img.logo { width: 100px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 24px; color: var(--accent); }
    p.subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 30px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 8px; color: #cbd5e1; }
    input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; transition: 0.3s; box-sizing: border-box; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: var(--primary); font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    footer { margin-top: 30px; font-size: 11px; color: #64748b; }

    .swal-btn-text-dark { color: #003366 !important; font-weight: bold; }
    
  </style>
</head>
<body>
  <div class="card">
    <img src="https://lh3.googleusercontent.com/pw/AP1GczM_UPrepfWkWp7jie4Km8sQ31_CG_kAWBdf0n1pqo_DxxM_rdZrJuI88Bl3rS36MIAwqtcBFcJbv2P2Rqrvy59MbD_OkSroCvOZJv9EXIgwgU5JNYSOKU7E05N0UP_SiBF_yfYLKj1RmFyfE-BGJV9N=w500-h500-s-no-gm?authuser=0" class="logo">
    <h1>DAFTAR HADIR</h1>
    <p class="subtitle">Sosialisasi Pengembangan Karier dalam Jabatan Fungsional</p>
    
    <div class="form-group">
      <label>Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Contoh: BUDI SANTOSO, S.Kom.">
    </div>
    <div class="form-group">
      <label>Unit Kerja</label>
      <input type="text" id="unit" placeholder="Contoh: DINAS KESEHATAN">
    </div>
    <div class="form-group">
      <label>Email Gmail Aktif</label>
      <input type="email" id="email" placeholder="Contoh: budi@gmail.com">
    </div>
    
    <button onclick="submitForm()">KIRIM</button>
    <footer>© 2026 – BKPSDM Balangan</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script>
    // MASUKKAN URL WEB APP GAS KAMU DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbwXlupppAVU41aURwZcRaJsGF-6bSA-5VbxTRGbbSSC2Dll-IpLT-dQFm9W6vtabBz5NQ/exec'; 

    // Mengecek status formulir saat halaman dimuat
    document.addEventListener("DOMContentLoaded", () => {
      // Munculkan loading tidak bisa ditutup saat mengecek ke server
      Swal.fire({
        title: 'Memeriksa Sistem...',
        html: 'Menghubungkan ke server BKPSDM.',
        background: '#1e293b',
        color: '#fff',
        allowOutsideClick: false,
        allowEscapeKey: false,
        showConfirmButton: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });
  
      // Melakukan GET request ke GAS
      fetch(API_URL, {
        method: 'GET',
        redirect: 'follow'
      })
      .then(response => response.json())
      .then(res => {
        if (res.status === 'closed') {
          // Jika ditutup, ubah SweetAlert menjadi peringatan yang TIDAK BISA DITUTUP
          Swal.fire({
            icon: 'warning',
            title: 'Formulir Ditutup',
            text: res.message,
            background: '#1e293b',
            color: '#fff',
            allowOutsideClick: false, // Tidak bisa klik di luar
            allowEscapeKey: false,    // Tidak bisa tekan tombol ESC
            showConfirmButton: false, // Tombol OK dihilangkan
            backdrop: `rgba(0,0,0,0.9)` // Menggelapkan latar belakang secara total
          });
        } else {
          // Jika masih buka, tutup loading dan biarkan user mengisi form
          Swal.close();
        }
      })
      .catch(error => {
        // Jika terjadi gangguan koneksi, tutup loading agar user bisa mencoba submit manual
        Swal.close();
      });
    });
    
    function submitForm() {
      const data = {
        nama: document.getElementById('nama').value,
        unit: document.getElementById('unit').value,
        email: document.getElementById('email').value
      };
      
      // 1. SweetAlert untuk Validasi Bidang Kosong
      if(!data.nama || !data.unit || !data.email) {
        return Swal.fire({
          icon: 'warning',
          title: 'Perhatian',
          text: 'Mohon isi semua field data!',
          background: '#1e293b',
          color: '#fff',
          confirmButtonColor: '#fbbf24',
          customClass: { confirmButton: 'swal-btn-text-dark' }
        });
      }
      
      // 2. SweetAlert untuk Loading Animasi
      Swal.fire({
        title: 'Memproses...',
        html: 'Sedang membuat dan mengirim sertifikat Anda.',
        background: '#1e293b',
        color: '#fff',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });
      
      // Kirim data ke GAS
      fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(res => {
        if(res.status === 'success') {
          // 3. SweetAlert untuk Sukses
          Swal.fire({
            icon: 'success',
            title: 'Berhasil!',
            text: 'Sertifikat Anda telah terbit. Silakan klik tombol di bawah untuk melihat dan mengunduhnya.',
            background: '#1e293b',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#fbbf24',
            cancelButtonColor: '#334155',
            confirmButtonText: '<span style="color:#003366; font-weight:bold;">Lihat Sertifikat</span>',
            cancelButtonText: 'Isi Kembali',
            reverseButtons: true
          }).then((result) => {
            if (result.isConfirmed) {
              // Buka PDF di tab baru jika tombol "Lihat Sertifikat" diklik
              window.open(res.pdfUrl, '_blank');
              // Refresh halaman setelah membuka tab baru
              location.reload(); 
            } else {
              // Refresh halaman jika tombol "Isi Kembali" diklik
              location.reload();
            }
          });
        } 
        else if(res.status === 'closed') {
          // SweetAlert khusus untuk Waktu Habis
          Swal.fire({
            icon: 'info',
            title: 'Formulir Ditutup',
            text: res.message, // Menampilkan pesan dari GAS
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#fbbf24',
            customClass: { confirmButton: 'swal-btn-text-dark' }
          });
        }
        else {
          // 4. SweetAlert untuk Error dari Server
          Swal.fire({
            icon: 'error',
            title: 'Gagal',
            text: 'Terjadi kesalahan sistem: ' + res.message,
            background: '#1e293b',
            color: '#fff',
            confirmButtonColor: '#fbbf24'
          });
        }
      })
      .catch(error => {
        // 5. SweetAlert untuk Error Koneksi/CORS
        Swal.fire({
          icon: 'error',
          title: 'Koneksi Terputus',
          text: 'Gagal terhubung ke server. Pastikan koneksi internet stabil.',
          background: '#1e293b',
          color: '#fff',
          confirmButtonColor: '#fbbf24'
        });
      });
    }
  </script>
</body>
</html>
