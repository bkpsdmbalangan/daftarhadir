<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Hadir - BKPSDM Balangan</title>
  
  <!-- Ini kode favicon kamu -->
  <link rel="icon" type="image/png" href="favicon.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #003366; --accent: #fbbf24; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    img.logo { width: 100px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: 24px; color: var(--accent); }
    p.subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 30px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 8px; color: #cbd5e1; }
    input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; transition: 0.3s; box-sizing: border-box; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
    button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: var(--primary); font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 16px; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    footer { margin-top: 30px; font-size: 11px; color: #64748b; }
    
    /* Loading Modal */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
    .modal-content { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--accent); }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://lh3.googleusercontent.com/pw/AP1GczM_UPrepfWkWp7jie4Km8sQ31_CG_kAWBdf0n1pqo_DxxM_rdZrJuI88Bl3rS36MIAwqtcBFcJbv2P2Rqrvy59MbD_OkSroCvOZJv9EXIgwgU5JNYSOKU7E05N0UP_SiBF_yfYLKj1RmFyfE-BGJV9N=w500-h500-s-no-gm?authuser=0" class="logo">
    <h1>DAFTAR HADIR</h1>
    <p class="subtitle">Sosialisasi Pengembangan dalam Jabatan Fungsional</p>
    
    <div class="form-group">
      <label>Nama Lengkap (Sesuai Sertifikat)</label>
      <input type="text" id="nama" placeholder="Contoh: Budi Santoso, S.Kom">
    </div>
    <div class="form-group">
      <label>Unit Kerja</label>
      <input type="text" id="unit" placeholder="Contoh: Bagian Organisasi">
    </div>
    <div class="form-group">
      <label>Email Gmail Aktif</label>
      <input type="email" id="email" placeholder="Contoh: budi@gmail.com">
    </div>
    
    <button onclick="submitForm()">KIRIM</button>
    <footer>© 2026 – BKPSDM Balangan</footer>
  </div>

  <div id="modal">
    <div class="modal-content" id="mContent">
      <div class="loader"></div>
      <p id="mText">Sedang memproses sertifikat Anda...</p>
    </div>
  </div>

  <script>
    // MASUKKAN URL WEB APP GAS KAMU DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycb.../exec'; 

    function submitForm() {
      const data = {
        nama: document.getElementById('nama').value,
        unit: document.getElementById('unit').value,
        email: document.getElementById('email').value
      };
      
      if(!data.nama || !data.unit || !data.email) return alert('Mohon isi semua bidang!');
      
      // Tampilkan Modal Loading
      document.getElementById('modal').style.display = 'flex';
      
      // Kirim data ke GAS menggunakan fetch
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(res => {
        if(res.status === 'success') {
          document.getElementById('mContent').innerHTML = `
            <h2 style="color:#fbbf24">Berhasil!</h2>
            <p>Sertifikat telah dikirim ke email Anda.</p>
            <button onclick="window.open('${res.pdfUrl}')" style="background:#fbbf24; color:#003366; padding: 10px 20px; border:none; border-radius: 8px; cursor: pointer; font-weight: bold;">Lihat Sertifikat</button>
            <p style="margin-top:20px; font-size:12px; cursor:pointer; color:#94a3b8" onclick="location.reload()">Isi Kembali</p>
          `;
        } else {
          alert('Terjadi kesalahan sistem: ' + res.message);
          document.getElementById('modal').style.display = 'none';
        }
      })
      .catch(error => {
        alert('Gagal terhubung ke server. Pastikan koneksi internet stabil.');
        document.getElementById('modal').style.display = 'none';
      });
    }
  </script>
</body>
</html>
